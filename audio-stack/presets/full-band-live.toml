[meta]
name = "Full Band (Live)"
description = "All sources simultaneously: guitar DI, guitar amp mic, bass amp mic, synth"
tags = ["band", "live", "multitrack", "all-sources"]

[pipewire]
quantum = 512
rate = 48000

[interfaces]
default_source = "alsa_input.usb-Native_Instruments_Komplete_Audio_2_0000A748-00.analog-stereo"
default_sink = "alsa_output.usb-Native_Instruments_Komplete_Audio_2_0000A748-00.analog-stereo"

[jack_routing]
"Komplete Audio 2:capture_FL" = ["REAPER:in_1"]
"Komplete Audio 2:capture_FR" = ["REAPER:in_2"]
"MG-XU:capture_FL" = ["REAPER:in_3"]
"MG-XU:capture_FR" = ["REAPER:in_4"]
"REAPER:out_1" = ["Komplete Audio 2:playback_FL"]
"REAPER:out_2" = ["Komplete Audio 2:playback_FR"]

[faust_dsp]
# No Faust processing — capture clean, process in DAW

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight run per ref; newer pushes cancel older ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test + DCF loopback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build the framework
        run: nix build .#default -L

      - name: UTF-8 / font tests
        run: nix develop --command make test

      - name: DCF remote-transport loopback (bridge <-> dm.dcf over UDP)
        run: nix develop --command bash audio-stack/bridge/test/loopback.sh

      - name: Headless smoke — every example renders and exits clean
        run: |
          nix develop --command bash -eu -c '
            make >/dev/null
            for e in hello dsp_panel dsp_studio systems_viz card_launcher; do
              SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
                DEMOD_SHOT=/tmp/$e.ppm DEMOD_SHOT_FRAME=60 \
                timeout 20 ./demod-ui examples/$e.lua
              echo "  $e: ok"
            done
          '

  # ── Cross-platform client (native UI over DCF/UDP) — CMake build ──────
  # Proves the macOS / Windows remote-client build (core + dm.dcf, local IPC
  # gated out). Engine stays Linux-only. See docs/remote-client.md.
  client-macos:
    name: client build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2 + Lua
        run: brew install sdl2 lua pkg-config
      - name: Configure + build (DEMOD_CLIENT)
        run: |
          cmake -S . -B build -DDEMOD_DCF=ON
          cmake --build build -j
      - name: Headless smoke
        run: |
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
            DEMOD_SHOT=/tmp/mac.ppm DEMOD_SHOT_FRAME=30 \
            ./build/demod-ui examples/hello.lua

  client-windows:
    name: client build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2 + Lua (vcpkg)
        run: vcpkg install sdl2 lua
      - name: Configure + build (DEMOD_CLIENT)
        run: |
          cmake -S . -B build -DDEMOD_DCF=ON `
            -DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake
          cmake --build build --config Release
